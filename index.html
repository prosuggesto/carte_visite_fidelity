<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Carte de contact digitale - Diego Lamperim | Fidelity">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#e8e6e1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Diego | Fidelity">
    
    <title>Diego Lamperim — Fidelity</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page">

        <!-- Star Field (Shooting Stars) -->
        <div class="star-field">
            <div class="shooting-star star-1"></div>
            <div class="shooting-star star-2"></div>
            <div class="shooting-star star-3"></div>
            <div class="shooting-star star-4"></div>
        </div>

        <!-- 3D Card Scene -->
        <div class="card-scene" id="card-scene">
            <div class="business-card" id="business-card">

                <!-- ============ FRONT ============ -->
                <div class="card-face front">
                    <!-- Geometric gold shards -->
                    <div class="geo-shard geo-shard-1"></div>
                    <div class="geo-shard geo-shard-2"></div>
                    <div class="geo-shard geo-shard-3"></div>
                    <div class="geo-shard geo-shard-4"></div>
                    <div class="geo-shard geo-shard-5"></div>
                    <div class="geo-shard geo-shard-6"></div>

                    <!-- Neon line accents -->
                    <div class="line-accent line-top"></div>
                    <div class="line-accent line-right"></div>
                    <div class="line-accent line-bottom"></div>

                    <!-- Center content -->
                    <div class="front-content">
                        <!-- Exact Fidelity Logo Image -->
                        <div class="fidelity-logo-wrap">
                            <img src="fidelity-logo.png" alt="Fidelity Logo" class="actual-logo front-logo">
                        </div>
                        <h1 class="brand-title">FIDELITY</h1>
                    </div>
                </div>

                <!-- ============ BACK ============ -->
                <div class="card-face back">
                    <!-- Geometric gold shards (back) -->
                    <div class="geo-shard geo-shard-b1"></div>
                    <div class="geo-shard geo-shard-b2"></div>
                    <div class="geo-shard geo-shard-b3"></div>

                    <!-- Line accents -->
                    <div class="line-accent line-left-b"></div>

                    <!-- Content -->
                    <div class="back-content">
                        <!-- Name section -->
                        <div class="back-header">
                            <h2 class="person-name">DIEGO LAMPERIM</h2>
                            <div class="gold-rule"></div>
                        </div>

                        <!-- Contact rows -->
                        <div class="contact-rows">
                            <a href="mailto:lamperim.diego.fidelity.es@gmail.com" class="contact-row" id="action-email">
                                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="4" width="20" height="16" rx="3"/>
                                    <polyline points="22,7 12,14 2,7"/>
                                </svg>
                                <span>lamperim.diego.fidelity.es@gmail.com</span>
                            </a>
                            <a href="tel:+33767569224" class="contact-row" id="action-phone">
                                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.81.36 1.6.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c1.21.34 2 .57 2.81.7A2 2 0 0 1 22 16.92z"/>
                                </svg>
                                <span>+33 7 67 56 92 24</span>
                            </a>
                        </div>

                        <!-- QR + mini logo -->
                        <div class="back-footer">
                            <div class="qr-area">
                                <div id="qrcode" class="qr-box"></div>
                            </div>
                            <!-- Mini Fidelity logo (Image) -->
                            <div class="mini-brand">
                                <img src="fidelity-logo.png" alt="Fidelity Mini Logo" class="actual-logo back-logo">
                                <span class="mini-brand-text">FIDELITY</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Save button below -->
        <button class="save-btn" id="save-contact">
            <svg class="save-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            Guardar en mis contactos
        </button>

    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="toast-message">¡Contacto guardado!</span>
    </div>

    <!-- WhatsApp Modal -->
    <div class="wa-overlay" id="wa-overlay"></div>
    <div class="wa-modal" id="wa-modal">
        <div class="wa-icon-wrap">
            <svg viewBox="0 0 24 24" fill="currentColor" class="wa-icon">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.888-.788-1.487-1.761-1.66-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
            </svg>
        </div>
        <h3 class="wa-title">¡Contacto guardado!</h3>
        <p class="wa-desc">Para que yo también pueda guardarte de mi lado, mándame un mensaje rápido.</p>
        <a href="https://wa.me/33767569224?text=%C2%A1Hola%20Diego%21%20Aqu%C3%AD%20tienes%20mi%20n%C3%BAmero." class="wa-action-btn" target="_blank" rel="noopener">Enviar mi número</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
