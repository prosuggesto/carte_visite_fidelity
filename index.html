<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Carte de contact digitale - Diego Lamperim | Fidelity">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#e8e6e1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Diego | Fidelity">
    
    <title>Diego Lamperim — Fidelity</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page">

        <!-- Instruction -->
        <p class="tap-hint" id="tap-hint">
            <span class="hint-icon">👆</span> Touchez la carte pour la retourner
        </p>

        <!-- 3D Card Scene -->
        <div class="card-scene" id="card-scene">
            <div class="business-card" id="business-card">

                <!-- ============ FRONT ============ -->
                <div class="card-face front">
                    <!-- Geometric gold shards -->
                    <div class="geo-shard geo-shard-1"></div>
                    <div class="geo-shard geo-shard-2"></div>
                    <div class="geo-shard geo-shard-3"></div>
                    <div class="geo-shard geo-shard-4"></div>
                    <div class="geo-shard geo-shard-5"></div>
                    <div class="geo-shard geo-shard-6"></div>

                    <!-- Neon line accents -->
                    <div class="line-accent line-top"></div>
                    <div class="line-accent line-right"></div>
                    <div class="line-accent line-bottom"></div>

                    <!-- Center content -->
                    <div class="front-content">
                        <!-- Exact Fidelity Logo Image -->
                        <div class="fidelity-logo-wrap">
                            <img src="fidelity-logo.png" alt="Fidelity Logo" class="actual-logo front-logo">
                        </div>
                        <h1 class="brand-title">FIDELITY</h1>
                    </div>
                </div>

                <!-- ============ BACK ============ -->
                <div class="card-face back">
                    <!-- Geometric gold shards (back) -->
                    <div class="geo-shard geo-shard-b1"></div>
                    <div class="geo-shard geo-shard-b2"></div>
                    <div class="geo-shard geo-shard-b3"></div>

                    <!-- Line accents -->
                    <div class="line-accent line-left-b"></div>

                    <!-- Content -->
                    <div class="back-content">
                        <!-- Name section -->
                        <div class="back-header">
                            <h2 class="person-name">DIEGO LAMPERIM</h2>
                            <div class="gold-rule"></div>
                        </div>

                        <!-- Contact rows -->
                        <div class="contact-rows">
                            <a href="mailto:lamperim.diego.fidelity.es@gmail.com" class="contact-row" id="action-email">
                                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="4" width="20" height="16" rx="3"/>
                                    <polyline points="22,7 12,14 2,7"/>
                                </svg>
                                <span>lamperim.diego.fidelity.es@gmail.com</span>
                            </a>
                            <a href="tel:+33767569224" class="contact-row" id="action-phone">
                                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.81.36 1.6.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c1.21.34 2 .57 2.81.7A2 2 0 0 1 22 16.92z"/>
                                </svg>
                                <span>+33 7 67 56 92 24</span>
                            </a>
                        </div>

                        <!-- QR + mini logo -->
                        <div class="back-footer">
                            <div class="qr-area">
                                <div id="qrcode" class="qr-box"></div>
                            </div>
                            <!-- Mini Fidelity logo (Image) -->
                            <div class="mini-brand">
                                <img src="fidelity-logo.png" alt="Fidelity Mini Logo" class="actual-logo back-logo">
                                <span class="mini-brand-text">FIDELITY</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Save button below -->
        <button class="save-btn" id="save-contact">
            <svg class="save-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            Enregistrer dans mes contacts
        </button>

    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="toast-message">Contact téléchargé !</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
